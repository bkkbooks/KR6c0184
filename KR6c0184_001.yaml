body:
  text: 丹霞沙門釋天然圅昰撰梵語般若此云智慧以智慧解諸法空而至于彼岸是矣又曰心經何謂也華首曰心是體智是用體則通凡聖而皆徧用則分迷悟以各成天下無無用之體體即徧而用安得不徧歟曰徧而迷悟異致故曰各成各成則不可均言智慧矣此所謂本覺則聖凡無二迷本為妄悟本為始妄與始無二體而有二用也當其迷也見色而不見空迺至見受想行識而不見空行于日用欲求其毫釐解脫而不可得矣及其悟也即色是空更無別空即空是色更無別色迺至即受想行識是空更無別空即空是受想行識更無別受想行識行於日用欲求其毫釐凝滯而亦不可得矣是迷悟之用各異而皆原于本覺之心固無有異也通凡聖而無有異故曰體也自無始來無佛名無菩薩名無二乘凡夫名唯渾然藏識而已藏無自性不覺成識識成而根身器界名相臚然而藏性不失識滅而三明六通智證詣極而藏性不加所謂無生滅之謂心無垢淨之謂心無增減之謂心此心空相本自如然而非深于般若則未有能徹見而返本歸源者此三世如來所讚歎尊重無異旨也般若生于本覺而要迷情淨盡然後現妄覺亦生于本覺而要當體知歸然後泯故知翻其妄而自照之為智智生即無妄妄成智也智解諸法空還其本覺之無動搖之為心心返則無智智盡心也涅槃三德非縱非橫而悉始于明見佛性融根本差別而一至于是所謂佛性為因而涅槃為果也由是而造焉之謂經也
